# lkjmcsmp Configuration
#
# Maruishi Points are the server currency, generated by converting cobblestone.
# 1 cobblestone = 1 Maruishi Point.

teleport:
  request-timeout-seconds: 60
  rtp-cooldown-seconds: 60
  stability-delay-seconds: 5
  stability-radius-blocks: 1
  rtp-min-radius: 1000
  rtp-max-radius: 100000
  rtp-attempts: 10
  rtp-world-whitelist:
    - world
  first-join:
    enabled: true
    world: ""
homes:
  max-per-player: 3
economy:
  allow-partial-convert: false
  max-convert-per-op: 4096
party:
  invite-timeout-seconds: 60
respawn-on-death:
  random-teleport:
    enabled: true
temporary-dimension:
  cost: 10000
  transfer-radius: 10
  duration-minutes: 180
database:
  file: plugins/lkjmcsmp/lkjmcsmp.db
