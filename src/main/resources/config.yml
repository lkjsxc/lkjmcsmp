# lkjmcsmp Configuration
#
# Cobblestone Points are the server currency, generated by converting cobblestone.
# 1 cobblestone = 1 Cobblestone Point.

teleport:
  request-timeout-seconds: 60
  rtp-cooldown-seconds: 60
  stability-delay-seconds: 5
  stability-radius-blocks: 1
  rtp-min-radius: 1000
  rtp-max-radius: 100000
  rtp-attempts: 10
  rtp-world-whitelist:
    - world
  initial-trigger:
    enabled: true
    trigger-world: world
    target-world: world
    center-x: 0
    center-z: 0
    trigger-radius-blocks: 200
    countdown-seconds: 5
    cancel-on-exit: true
    once-per-player: true
homes:
  max-per-player: 3
economy:
  allow-partial-convert: false
  max-convert-per-op: 4096
party:
  invite-timeout-seconds: 60
respawn-on-death:
  random-teleport:
    enabled: true
temporary-dimension:
  transfer-radius: 5
  duration-minutes: 180
database:
  file: plugins/lkjmcsmp/lkjmcsmp.db
