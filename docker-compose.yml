services:
  folia:
    image: itzg/minecraft-server:java21
    environment:
      EULA: "TRUE"
      TYPE: "FOLIA"
      VERSION: "${MC_VERSION:-1.21.11}"
      MEMORY: "2G"
      ONLINE_MODE: "FALSE"
      ENABLE_RCON: "true"
      RCON_PASSWORD: "${RCON_PASSWORD:-lkjmcsmp-rcon}"
      OPS: "${OPS:-}"
    ports:
      - "25566:25565"
      - "25576:25575"
    volumes:
      - ./tmp/mc-data:/data
      - ./build/libs:/plugins:ro
    healthcheck:
      test: ["CMD", "mc-monitor", "status", "--host", "127.0.0.1", "--port", "25565"]
      interval: 15s
      timeout: 10s
      retries: 20
